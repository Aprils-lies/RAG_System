server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/rag?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    # redis配置
    redis:
      host: localhost
      port: 6379

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # 控制台打印 SQL
    map-underscore-to-camel-case: true                     # 下划线转驼峰
  global-config:
    db-config:
      id-type: auto                                       # 主键策略
      logic-delete-field: deleted                          # 逻辑删除字段
      logic-delete-value: 1                                # 已删除值
      logic-not-delete-value: 0                            # 未删除值
  mapper-locations: classpath:mapper/*.xml               # XML 映射文件路径
  type-aliases-package: com.april.rag.entity             # 实体扫描路径

# jwt配置
jwt:
  secret-key: "PXrQbuCwXwOZzkML/Vm2S5rSwt1iybvmKtGDzVEu+Hc="


# 管理员账号初始化配置
admin:
  username: admin
  password: admin123
  primary-org: default
  org-tags: default,admin