server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/rag?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    # redis配置
    redis:
      host: localhost
      port: 6379
  kafka:
    enabled: true  # 启用 Kafka
    bootstrap-servers: 127.0.0.1:9092 # Kafka 服务器地址
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      enable-idempotence: true
      transactional-id-prefix: file-upload-tx-
      properties:
        client.dns.lookup: use_all_dns_ips
    consumer:
      group-id: file-processing-group # 消费者组 ID
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*" # 允许反序列化的包
        client.dns.lookup: use_all_dns_ips
    topic:
      file-processing: file-processing-topic1 # 新增的 Topic 配置
      dlt: file-processing-dlt # 死信队列主题

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # 控制台打印 SQL
    map-underscore-to-camel-case: true                     # 下划线转驼峰
  global-config:
    db-config:
      id-type: auto                                       # 主键策略
      logic-delete-field: deleted                          # 逻辑删除字段
      logic-delete-value: 1                                # 已删除值
      logic-not-delete-value: 0                            # 未删除值
  mapper-locations: classpath:mapper/*.xml               # XML 映射文件路径
  type-aliases-package: com.april.rag.entity             # 实体扫描路径

# minIO配置
minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: uploads
  publicUrl: http://localhost:9000

# jwt配置
jwt:
  secret-key: "PXrQbuCwXwOZzkML/Vm2S5rSwt1iybvmKtGDzVEu+Hc="

# 管理员账号初始化配置
admin:
  username: admin
  password: admin123
  primary-org: default
  org-tags: default,admin

file:
  parsing:
    chunk-size: 512 # 每个文本块的最大字符数
    buffer-size: 8192    # 8KB 缓冲区
    max-memory-threshold: 0.8  # 80% 内存阈值

elasticsearch:
  host: localhost       # Elasticsearch主机地址
  port: 9200            # Elasticsearch端口号
  scheme: http         # 协议（http/https）
#  username: elastic     # 安装后生成的默认用户
#  password: zVLf2sb05Pnuk8toM+ws

embedding:
  api:
    url: https://dashscope.aliyuncs.com/compatible-mode/v1
    key:    # 填入通义千问API key
    model: text-embedding-v4
    batch-size: 10  # 单次请求最大行数（DashScope限制为10）
    dimension: 2048  # 指定向量维度
