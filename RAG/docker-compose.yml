#      - "2181:2181"
#    volumes:
#      - zookeeper-data:/bitnami/zookeeper
#    networks:
#      - data-network
#
#  # Kafka 3.9.0 - 匹配您之前的版本
#  kafka:
#    image: bitnami/kafka:3.9.0  # 使用 3.9.0 版本
